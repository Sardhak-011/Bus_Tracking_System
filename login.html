<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBus - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-sign-in-alt"></i> Welcome Back</h1>
  </div>

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header text-center"><h4>Login</h4></div>
          <div class="card-body">
            <select id="role" class="form-select mb-3">
              <option value="passenger">Passenger</option>
              <option value="driver">Driver</option>
              <option value="admin">Admin</option>
            </select>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email (e.g., test@example.com)">
            <input type="password" id="password" class="form-control mb-3" placeholder="Password (e.g., 123)">
            <button onclick="simulateLogin(document.getElementById('email').value, document.getElementById('password').value, document.getElementById('role').value)" class="btn btn-primary w-100 mb-3">Login</button>
            <p class="text-center">New user? <a href="#" onclick="alert('Signup simulation: Use login with new email.')">Signup</a> | Google Sign-in (Mock)</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2023 SmartBus System. Built for [Your College Name]. | <a href="about.html">About</a> | <a href="contact.html">Contact</a></p>
      <p class="mb-0 small">Powered by 3-Layer Routing 🚍</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
